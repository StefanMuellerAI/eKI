openapi: 3.1.1
info:
  title: eKI API
  version: 0.6.0
  description: |
    KI-gestützte Sicherheitsprüfung für Drehbücher - Filmakademie Baden-Württemberg

    Die eKI ist eine modulare REST-API, die Drehbücher aus dem eProjekt-System entgegennimmt,
    KI-gestützt auf Sicherheitsrisiken analysiert und strukturierte Reports zurückliefert.

    ## Kernprinzipien
    - **Design-First:** Diese OpenAPI-Spezifikation ist die Single Source of Truth
    - **Processing-Only:** Keine persistente Speicherung von Drehbüchern/Reports (nur Audit-Metadaten)
    - **Write-Through:** Ergebnisse werden sofort an eProjekt zurückgespielt
    - **Minimalinvasiv:** Integration nur über REST, keine direkten DB-Zugriffe

    ## Meilenstein-Status
    - M01: Projektgerüst & OpenAPI ✓
    - M02: Parser Basis (FDX) ✓
    - M03: PDF & Streaming-Parsing ✓
    - M04: Risiko-Taxonomie & Scoring ✓
    - M05: Reports (JSON/PDF) & One-Shot-GET ✓
    - M06: LLM-Adapter (Mistral Cloud) & KB-Grundlage ✓
    - M07: Großdokument-Optimierung ✓
    - M08: Security/Privacy & Delete-on-Delivery ✓

  contact:
    name: Filmakademie Baden-Württemberg
  license:
    name: Proprietary

servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://eki-stage.filmakademie.de
    description: Staging environment
  - url: https://eki.filmakademie.de
    description: Production environment

tags:
  - name: Health
    description: Health and readiness checks
  - name: Security
    description: Security check operations
  - name: KnowledgeBase
    description: Knowledge Base management (M06) for RAG-augmented risk analysis

paths:
  /health:
    get:
      tags:
        - Health
      summary: Liveness probe
      description: Simple health check that returns 200 if the service is running
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /ready:
    get:
      tags:
        - Health
      summary: Readiness probe
      description: >-
        Checks if the service is ready to handle requests by verifying all
        dependencies (PostgreSQL, Redis, Temporal). Requires API-key authentication.
      operationId: readinessCheck
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'

  /v1/security/check:
    post:
      tags:
        - Security
      summary: Synchronous security check
      description: >-
        Perform a synchronous security check for scripts ≤1 MB or ≤50 scenes.
        Accepts JSON (base64-encoded script_content) or multipart/form-data file upload (.fdx, .pdf).
      operationId: securityCheckSync
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ActorUserId'
        - $ref: '#/components/parameters/ActorProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecurityCheckRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MultipartSecurityCheckRequest'
      responses:
        '200':
          description: Security check completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncSecurityCheckResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          description: File exceeds maximum size (10 MB)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/security/check:async:
    post:
      tags:
        - Security
      summary: Asynchronous security check
      description: >-
        Start an asynchronous security check via Temporal workflow.
        Accepts JSON (base64-encoded script_content) or multipart/form-data file upload (.fdx, .pdf).
        Script content is AES-encrypted in Redis; only a reference key is passed to the workflow.
        Supports idempotency keys and configurable delivery mode (pull/push).
      operationId: securityCheckAsync
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ActorUserId'
        - $ref: '#/components/parameters/ActorProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsyncSecurityCheckRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MultipartAsyncSecurityCheckRequest'
      responses:
        '202':
          description: Security check job created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncSecurityCheckResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          description: File exceeds maximum size (10 MB)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          description: Workflow engine temporarily unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/security/jobs/{job_id}:
    get:
      tags:
        - Security
      summary: Get job status
      description: >-
        Query the status of an asynchronous security check job.
        Returns real data from the database including progress percentage and report ID.
        Ownership is verified against the authenticated API key.
      operationId: getJobStatus
      security:
        - BearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          description: Job ID to query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/security/reports/{report_id}:
    get:
      tags:
        - Security
      summary: Retrieve report (one-shot)
      description: >-
        Retrieve a security report (JSON + PDF). The URL is invalidated after
        the first successful retrieval (one-shot pull mode). Subsequent requests
        return 410 Gone. Ownership is verified against the authenticated API key.
      operationId: getReport
      security:
        - BearerAuth: []
      parameters:
        - name: report_id
          in: path
          required: true
          description: Report ID to retrieve
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Report retrieved successfully (URL now invalidated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
          description: Report already retrieved (URL invalidated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalError'

  # -------------------------------------------------------------------------
  # M06: Knowledge Base endpoints
  # -------------------------------------------------------------------------
  /v1/kb/documents:
    post:
      tags:
        - KnowledgeBase
      summary: Upload a KB document
      description: >-
        Upload a safety document (.pdf, .md, .txt) into the project knowledge
        base. The document is chunked, embedded, and stored Fernet-encrypted.
        Idempotent via SHA-256 content hash: re-uploading the same content
        returns 409 Conflict.
      operationId: uploadKbDocument
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, title]
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF, Markdown, or plain text file (max 10 MB)
                title:
                  type: string
                  minLength: 1
                  maxLength: 255
                source:
                  type: string
                  enum: [UPLOAD, SHARE, URL, PLACEHOLDER]
                  default: UPLOAD
                tags:
                  type: string
                  description: Comma-separated tag list (max 16 tags)
                ttl_hours:
                  type: integer
                  minimum: 1
                  maximum: 8760
                  default: 720
      responses:
        '201':
          description: Document ingested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KBDocumentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Duplicate content (identical SHA-256 already in KB)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

    get:
      tags:
        - KnowledgeBase
      summary: List KB documents
      description: Return metadata summaries for all KB documents of the calling tenant.
      operationId: listKbDocuments
      security:
        - BearerAuth: []
      parameters:
        - name: tag
          in: query
          required: false
          schema: { type: string }
          description: Filter to documents that carry the given tag
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: List of KB documents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KBListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

    delete:
      tags:
        - KnowledgeBase
      summary: Bulk delete KB documents by tag
      description: >-
        Delete all KB documents tagged with the given tag (e.g. `placeholder`
        to wipe seed data once real content is loaded).
      operationId: deleteKbDocumentsByTag
      security:
        - BearerAuth: []
      parameters:
        - name: tag
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Documents deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KBDeleteByTagResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /v1/kb/documents/{doc_id}:
    get:
      tags:
        - KnowledgeBase
      summary: Get KB document metadata
      description: Return metadata for a single KB document. Original text is never returned.
      operationId: getKbDocument
      security:
        - BearerAuth: []
      parameters:
        - name: doc_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: KB document metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KBDocumentResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags:
        - KnowledgeBase
      summary: Delete a single KB document
      description: Delete one KB document. Its embedding chunks cascade.
      operationId: deleteKbDocument
      security:
        - BearerAuth: []
      parameters:
        - name: doc_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Document deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KBDeleteResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

# -----------------------------------------------------------------------------
# M08: Outgoing webhooks (eKI -> eProjekt)
#
# OpenAPI 3.1 `webhooks` block: dokumentiert Callbacks, die die eKI nach
# aussen sendet. Aktiviert wird der Webhook nur, wenn die ENV-Variable
# EPRO_WEBHOOK_URL gesetzt ist. Payload ist bewusst inhaltsarm und enthaelt
# ausschliesslich Metadaten (Pflichtenheft Anhang 1).
# -----------------------------------------------------------------------------
webhooks:
  security.delivery.failed:
    post:
      tags:
        - Security
      summary: Zustellung fehlgeschlagen (Metadaten-Webhook)
      description: >-
        Wird von der eKI an die in `EPRO_WEBHOOK_URL` konfigurierte
        Empfaenger-URL gepostet, wenn die Zustellung eines Security-Reports
        endgueltig fehlgeschlagen ist -- entweder nach Erschoepfung des
        6-Stunden-Retry-Fensters oder bei einem nicht-retrybaren 4xx-Hard-Fail.
        Enthaelt ausschliesslich Metadaten; KEINE Reportinhalte und KEINE
        Drehbuchtexte. Pflichtenheft Anhang 1 + Abnahmetest 4.
      operationId: securityDeliveryFailedWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeliveryFailedPayload'
      responses:
        '2XX':
          description: >-
            Empfaenger hat den Webhook akzeptiert. Die eKI macht keine
            weiteren Zustellversuche fuer diesen Webhook.
        '4XX':
          description: Empfaenger lehnt Webhook ab (kein eKI-Retry)
        '5XX':
          description: Empfaenger-Fehler (eKI versucht bis zu 3x intern)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: APIKey
      description: >-
        Opaque API key transmitted as `Authorization: Bearer eki_<token>`.
        Keys are SHA-256 hashed and stored in PostgreSQL with expiry dates.

  parameters:
    ActorUserId:
      name: X-Actor-User-Id
      in: header
      description: Optional actor user ID for audit logging (must match authenticated API-key user if provided)
      required: false
      schema:
        type: string

    ActorProjectId:
      name: X-Actor-Project-Id
      in: header
      description: Actor project ID for audit logging
      required: false
      schema:
        type: string

  schemas:

    # --- Enums ---

    ScriptFormat:
      type: string
      enum: [fdx, pdf]
      description: "Supported script formats: Final Draft XML (.fdx) or PDF (.pdf)"

    JobStatus:
      type: string
      enum: [pending, running, completed, failed, cancelled]
      description: Status of an async security check job

    RiskLevel:
      type: string
      enum: [critical, high, medium, low, info]
      description: >-
        Risk level classification, calculated from likelihood × impact:
        critical (≥16), high (≥10), medium (≥5), low (≥2), info (<2)

    RiskCategory:
      type: string
      enum: [PHYSICAL, ENVIRONMENTAL, PSYCHOLOGICAL]
      description: Top-level risk category from the taxonomy

    # --- Request Schemas ---

    SecurityCheckRequest:
      type: object
      required:
        - script_content
        - script_format
        - project_id
      properties:
        script_content:
          type: string
          description: Base64-encoded script content (FDX as UTF-8 text, PDF as binary)
          minLength: 1
          maxLength: 10485760
        script_format:
          $ref: '#/components/schemas/ScriptFormat'
        project_id:
          type: string
          description: eProjekt project ID
          minLength: 1
          maxLength: 100
          pattern: '^[a-zA-Z0-9_-]+$'
        script_id:
          type: integer
          nullable: true
          description: >-
            eProjekt document ID of the script/treatment being analyzed.
            Passed back to ePro on push delivery so ePro can correlate the
            assessment with the correct document version. Use -1 if unknown.
        callback_url:
          type: string
          format: uri
          nullable: true
          description: >-
            Optional HTTPS callback URL for push delivery results.
            Must be on allowlisted eProjekt domains (epro.filmakademie.de,
            staging.epro.filmakademie.de). Private/internal IPs are blocked.
        delivery:
          type: string
          enum: [pull, push]
          default: pull
          description: >-
            Delivery mode: "pull" (One-Shot GET via /reports/{id}) or
            "push" (POST to ePro callback URL)
        idempotency_key:
          type: string
          nullable: true
          maxLength: 255
          description: >-
            Optional idempotency key to prevent duplicate jobs.
            If a job with the same key already exists, the existing job is returned.
        metadata:
          type: object
          additionalProperties: true
          description: Additional metadata for audit trail (max 50 keys, values ≤1000 chars)

    AsyncSecurityCheckRequest:
      allOf:
        - $ref: '#/components/schemas/SecurityCheckRequest'
        - type: object
          properties:
            priority:
              type: integer
              minimum: 1
              maximum: 10
              default: 5
              description: Job priority (1=highest, 10=lowest)

    MultipartSecurityCheckRequest:
      type: object
      required:
        - file
      properties:
        file:
          type: string
          format: binary
          description: Script file upload (.fdx or .pdf, max 10 MB). PDF files are validated by magic bytes.
        project_id:
          type: string
          description: eProjekt project ID
        script_format:
          $ref: '#/components/schemas/ScriptFormat'
        script_id:
          type: integer
          nullable: true
          description: eProjekt document ID
        delivery:
          type: string
          enum: [pull, push]
          default: pull
        idempotency_key:
          type: string
          nullable: true
          maxLength: 255

    MultipartAsyncSecurityCheckRequest:
      allOf:
        - $ref: '#/components/schemas/MultipartSecurityCheckRequest'
        - type: object
          properties:
            priority:
              type: integer
              minimum: 1
              maximum: 10
              default: 5

    # --- Response Schemas ---

    HealthResponse:
      type: object
      required:
        - status
        - timestamp
        - version
      properties:
        status:
          type: string
          example: healthy
        timestamp:
          type: string
          format: date-time
        version:
          type: string
          example: 0.5.0

    ReadinessResponse:
      type: object
      required:
        - status
        - timestamp
        - services
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        timestamp:
          type: string
          format: date-time
        services:
          type: object
          properties:
            database:
              type: boolean
            redis:
              type: boolean
            temporal:
              type: boolean
          required: [database, redis, temporal]
          example:
            database: true
            redis: true
            temporal: true

    MeasureItem:
      type: object
      required:
        - code
        - title
      properties:
        code:
          type: string
          description: "Measure code from the catalog (e.g. RIG-SAFETY, PSY-BRIEFING, INTIMACY-COORD)"
        title:
          type: string
          description: Human-readable measure title
        responsible:
          type: string
          description: "Responsible role (e.g. Stunt Coordination, Weapons Master, Production)"
        due:
          type: string
          description: "Due date template (e.g. pre-production, shooting-3d, shooting-0d)"

    RiskFinding:
      type: object
      required:
        - id
        - risk_level
        - category
        - description
        - recommendation
        - confidence
      properties:
        id:
          type: string
          description: Unique finding ID
        scene_number:
          type: string
          nullable: true
          description: Scene number where risk was found
        risk_level:
          $ref: '#/components/schemas/RiskLevel'
        category:
          type: string
          description: "Risk category: PHYSICAL, ENVIRONMENTAL, PSYCHOLOGICAL"
        risk_class:
          type: string
          description: >-
            Specific risk class from the taxonomy (e.g. FIRE, HEIGHT, INTIMACY,
            STUNTS, WEAPONS, WATER, VIOLENCE, TRAUMA). 23 classes across 3 categories.
        rule_id:
          type: string
          description: "Taxonomy rule ID (e.g. SEC-P-008 for FIRE, SEC-Y-003 for TRAUMA)"
        likelihood:
          type: integer
          minimum: 0
          maximum: 5
          description: "Likelihood of risk occurring (1-5, 0=unscored)"
        impact:
          type: integer
          minimum: 0
          maximum: 5
          description: "Severity of impact if risk occurs (1-5, 0=unscored)"
        description:
          type: string
          description: Human-readable description of the risk
        recommendation:
          type: string
          description: Mitigation recommendation
        measures:
          type: array
          items:
            $ref: '#/components/schemas/MeasureItem'
          description: Applicable safety measures from the codified catalog (20 measures)
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Confidence score of the finding (1.0 = FDX/certain, lower for PDF/LLM)
        line_reference:
          type: string
          nullable: true
          description: Specific line or dialogue reference in the script
        evidence:
          type: string
          description: Textual evidence or rule justification supporting the risk assessment
        vulnerability:
          type: string
          description: "Vulnerability factors (e.g. children, animals, stunt doubles)"
        complexity:
          type: string
          description: "Complexity factors (e.g. extras, multi-camera, water/fire elements)"
        exposure_duration:
          type: string
          description: "Estimated risk exposure duration (e.g. kurz, mehrere Stunden, ganzer Drehtag)"

    RiskSummary:
      type: object
      description: Count of findings per risk level
      required: [critical, high, medium, low, info]
      properties:
        critical:
          type: integer
          minimum: 0
        high:
          type: integer
          minimum: 0
        medium:
          type: integer
          minimum: 0
        low:
          type: integer
          minimum: 0
        info:
          type: integer
          minimum: 0
      example:
        critical: 1
        high: 3
        medium: 5
        low: 2
        info: 1

    SecurityReport:
      type: object
      required:
        - report_id
        - project_id
        - script_format
        - created_at
        - risk_summary
        - total_findings
        - findings
        - processing_time_seconds
      properties:
        report_id:
          type: string
          format: uuid
        project_id:
          type: string
        script_format:
          $ref: '#/components/schemas/ScriptFormat'
        created_at:
          type: string
          format: date-time
        risk_summary:
          $ref: '#/components/schemas/RiskSummary'
        total_findings:
          type: integer
        findings:
          type: array
          items:
            $ref: '#/components/schemas/RiskFinding'
        processing_time_seconds:
          type: number
          format: float
        metadata:
          type: object
          additionalProperties: true

    SyncSecurityCheckResponse:
      type: object
      required:
        - report
        - message
      properties:
        report:
          $ref: '#/components/schemas/SecurityReport'
        message:
          type: string
          example: Security check completed successfully

    AsyncSecurityCheckResponse:
      type: object
      required:
        - job_id
        - status
        - message
        - status_url
      properties:
        job_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/JobStatus'
        message:
          type: string
          example: "Security check job started (delivery=pull)"
        status_url:
          type: string
          description: URL to check job status (e.g. /v1/security/jobs/{job_id})
        estimated_completion_seconds:
          type: integer
          nullable: true

    JobStatusResponse:
      type: object
      required:
        - job_id
        - status
        - created_at
        - updated_at
      properties:
        job_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/JobStatus'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        progress_percentage:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
        report_id:
          type: string
          format: uuid
          nullable: true
        error_message:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          description: "Job metadata (includes delivery_mode)"

    ReportResponse:
      type: object
      required:
        - report
        - message
      properties:
        report:
          $ref: '#/components/schemas/SecurityReport'
        pdf_base64:
          type: string
          nullable: true
          description: >-
            Base64-encoded PDF report (human-readable) with Executive Summary,
            scene findings, and action-item checklist. Null if PDF generation failed.
        message:
          type: string
          example: Report retrieved successfully. This URL is now invalidated.

    # --- Error Schemas ---

    ErrorDetail:
      type: object
      required:
        - message
      properties:
        field:
          type: string
          nullable: true
        message:
          type: string
        error_code:
          type: string
          nullable: true

    ErrorResponse:
      type: object
      required:
        - error
        - message
        - timestamp
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
        request_id:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time

    # -----------------------------------------------------------------------
    # M06: Knowledge Base schemas
    # -----------------------------------------------------------------------
    KBDocumentResponse:
      type: object
      required: [doc_id, title, source, tags, uploaded_by, created_at, expires_at, chunk_count]
      properties:
        doc_id:
          type: string
          format: uuid
        title:
          type: string
        source:
          type: string
          enum: [UPLOAD, SHARE, URL, PLACEHOLDER]
        tags:
          type: array
          items: { type: string }
        uploaded_by:
          type: string
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        chunk_count:
          type: integer
          minimum: 0
          description: Number of embedding chunks stored for this document

    KBListResponse:
      type: object
      required: [total_returned, documents]
      properties:
        total_returned:
          type: integer
          minimum: 0
        documents:
          type: array
          items:
            $ref: '#/components/schemas/KBDocumentResponse'

    KBDeleteResponse:
      type: object
      required: [deleted, doc_id]
      properties:
        deleted:
          type: boolean
          default: true
        doc_id:
          type: string
          format: uuid

    KBDeleteByTagResponse:
      type: object
      required: [deleted, tag, count]
      properties:
        deleted:
          type: boolean
          default: true
        tag:
          type: string
        count:
          type: integer
          minimum: 0
          description: Number of documents deleted by this call

    # -----------------------------------------------------------------------
    # M08: Webhook payloads (eKI -> ePro)
    # -----------------------------------------------------------------------
    DeliveryFailedPayload:
      type: object
      required: [job_id, report_id, reason, attempts]
      description: >-
        Inhaltsarme Metadaten-Payload des security.delivery.failed Webhook.
        Enthaelt KEINE Reportinhalte und KEINE Drehbuchtexte (Pflichtenheft
        Anhang 1, Log-Hygiene Abnahmetest 7).
      properties:
        job_id:
          type: string
          description: Job-Identifikator (eKI-intern, UUID-String).
        report_id:
          type: string
          description: Report-Identifikator (eKI-intern, UUID-String).
        reason:
          type: string
          description: >-
            Maschinenlesbarer Grund der Zustellungs-Aufgabe.
            Beispiele: "retry_window_exhausted", "hard_4xx",
            "epro_unreachable".
        attempts:
          type: integer
          minimum: 1
          description: Anzahl der Zustellungsversuche bis zum Abbruch.

  responses:
    BadRequest:
      description: Bad request (missing fields, invalid file type, empty file)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Unauthorized (missing, invalid, or expired API key)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found or access denied (ownership check failed)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    ValidationError:
      description: Validation error (invalid base64, bad project_id format, SSRF blocked, etc.)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    RateLimitExceeded:
      description: Rate limit exceeded (IP-based 60/min or API-key-based 1000/h)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
